name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: build example registries and assemble the site
        run: |
          mkdir -p _site/relay _site/gambit
          cp pages/index.html _site/index.html
          touch _site/.nojekyll
          python3 tools/csr.py --root examples/relay/csr build
          cp examples/relay/csr/build/CSR.registry.html _site/relay/index.html
          python3 tools/csr.py --root examples/gambit/csr build
          cp examples/gambit/csr/build/CSR.registry.html _site/gambit/index.html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
