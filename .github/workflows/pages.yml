name: pages
on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: "17 6 * * 1"   # weekly rebuild so aggregated registries from other repos stay fresh
permissions:
  contents: read
  pages: write
  id-token: write
concurrency:
  group: pages
  cancel-in-progress: false
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pyyaml
      - name: build all registries and assemble the site
        run: |
          mkdir -p _site/relay _site/gambit _site/fold
          cp pages/index.html _site/index.html
          touch _site/.nojekyll

          # this repo's two worked examples (ship their source docs so PDF/source buttons resolve)
          python3 tools/csr.py --root examples/relay/csr build
          cp examples/relay/csr/build/CSR.registry.html _site/relay/index.html
          cp -r examples/relay/docs _site/relay/docs
          sed -i 's|href="\.\./\.\./|href="|g' _site/relay/index.html
          python3 tools/csr.py --root examples/gambit/csr build
          cp examples/gambit/csr/build/CSR.registry.html _site/gambit/index.html
          cp -r examples/gambit/docs _site/gambit/docs
          cp -r examples/gambit/src _site/gambit/src
          sed -i 's|href="\.\./\.\./|href="|g' _site/gambit/index.html

          # the fold preprint's claim registry, from its own public repo.
          # The version is NOT hardcoded here: fold-registry pins exactly one paper, and
          # hardcoding a filename silently breaks this build the day that pin moves.
          git clone --depth 1 https://github.com/manifoldcontrol/fold-registry _fold
          python3 _fold/csr/tools/csr.py --root _fold/csr build
          cp _fold/csr/build/CSR.registry.html _site/fold/index.html
          PDF=$(ls _fold/docs/Fold_Bifurcation_v*.pdf)
          test "$(echo "$PDF" | wc -l)" -eq 1 || { echo "expected exactly one pinned paper, got:"; echo "$PDF"; exit 1; }
          cp "$PDF" _site/fold/paper.pdf
          sed -i "s|href=\"../../docs/$(basename "$PDF")\"|href=\"paper.pdf\"|g" _site/fold/index.html
          grep -q 'href="paper.pdf"' _site/fold/index.html || { echo "paper link did not rewrite"; exit 1; }
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
